<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Défi — Épreuve 1</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <audio id="bgm" src="music.mp3" loop preload="auto"></audio>
  <button id="music-toggle" class="music-toggle" onclick="toggleMusic()" aria-label="Couper la musique">🔊</button>

  <div class="card">
    <span class="badge"><span class="dot"></span>ÉPREUVE 1/7 — MORSE</span>
    <div class="progress">
      <i class="done"></i><i></i><i></i><i></i><i></i><i></i><i></i>
    </div>
    <h2>Signal capté</h2>
    <p>Un vieux poste de radio étudiant émet ceci en boucle. Décode le message.</p>
    <div class="panel">.--- .</div>
    <input type="text" id="ans" placeholder="Ta réponse (un mot)">
    <button onclick="submitAnswer()">Valider</button>
    <div class="feedback" id="fb"></div>
    <details class="hint"><summary>👁️ Afficher l'indice</summary><p>Indice : chaque groupe de symboles = une lettre. Cherche « alphabet morse » si besoin.</p></details>
  </div>
  <script src="script.js"></script>
  <script>
    function submitAnswer(){ checkAnswer("ans","fb",["JE"],"enigme2.html","Énigme 1 réussie (Morse)"); }
    bindEnter("ans", submitAnswer);
  </script>
</body>
</html>
