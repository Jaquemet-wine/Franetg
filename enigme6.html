<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Défi — Épreuve 6</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <audio id="bgm" src="music.mp3" loop preload="auto"></audio>
  <button id="music-toggle" class="music-toggle" onclick="toggleMusic()" aria-label="Couper la musique">🔊</button>

  <div class="card">
    <span class="badge"><span class="dot"></span>ÉPREUVE 6/8 — LETTRES</span>
    <div class="progress">
      <i class="done"></i><i class="done"></i><i class="done"></i><i class="done"></i><i class="done"></i><i class="done"></i><i></i><i></i>
    </div>
    <h2>Lettres éparpillées</h2>
    <p>Remets ces lettres dans l'ordre pour former un mot.</p>
    <div class="panel" style="font-size:22px;">L · A · L · S · N · O</div>
    <input type="text" id="ans" placeholder="Ta réponse (un mot)">
    <button onclick="submitAnswer()">Valider</button>
    <div class="feedback" id="fb"></div>
    <details class="hint"><summary>👁️ Afficher l'indice</summary><p>Indice : 6 lettres, c'est un verbe conjugué.</p></details>
  </div>
  <script src="script.js"></script>
  <script>
    function submitAnswer(){ checkAnswer("ans","fb",["ALLONS"],"enigme7.html","Énigme 6 réussie (Anagramme)"); }
    bindEnter("ans", submitAnswer);
  </script>
</body>
</html>
